services:
  postgres:
    image: postgres:16
    container_name: beer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beer
      POSTGRES_USER: beer_user
      POSTGRES_PASSWORD: beer_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beer_user -d beer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./internal/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
